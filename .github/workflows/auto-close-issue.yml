name: Auto Close Linked Issues

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

permissions:
  pull-requests: read
  issues: write

concurrency:
  cancel-in-progress: true
  group: auto-close-issues-${{ github.ref }}

jobs:
  close-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Close referenced issues
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request
            const body = pr.body || "";
            const closeIssue = body.includes("**DO NOT CLOSE**")
            const state = pr.state

            const issueNumbers = [
              ...body.matchAll(
                /(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+(?:issue\s+)?#(\d+)/gi
              ),
            ].map(m => Number(m[1]));

            if(!issueNumbers.length) {
              core.info("No issues found. Bot goes back to sleep.");
              return;
            }

            for(const issue of issueNumbers) {
              const issue_number = parseInt(issue, 10)

              try {
                if(state === "closed") {
                  const closedBy = context.payload.sender.login

                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number,
                    body: `✅ Closed via PR #${pr.number}${closedBy ? ` by @${closedBy}` : ""}.`  
                  })
                }
                if(!closeIssue) {

                  await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                  state: "closed"
                });
                
                console.log(`Closed issue #${issue_number}`);
              }
                
              } catch (err) {
                console.log(`Failed for #${issue_number}`, err);
              }
            }
