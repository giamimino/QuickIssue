name: Sync Issue Labels to PR

on:
  pull_request:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  cancel-in-progress: true
  group: sync-issue-labels-${{ github.ref }}

jobs:
  copy-labels:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Copy issue labels
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request
            const body = pr.body || "";
            const closeIssue = body.includes("**DO NOT CLOSE**")
            const state = pr.state
            const hasClosingKeyword = /(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+(?:issue\s+)?#\d+/i.test(body);

            const issueNumbers = [
              ...body.matchAll(
                /(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved|issue|issues)\s+(?:issue\s+)?#(\d+)/gi
              ),
            ].map(m => Number(m[1]));

            if(!issueNumbers.length) {
              core.info("No issues found. Bot goes back to sleep.");
              return;
            }

            for(const issue of issueNumbers) {
              const issue_number = parseInt(issue, 10)

              try {
                const closedBy = context.payload.sender.login

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                  body: `✅ Closed via PR #${pr.number}${closedBy ? ` by @${closedBy}` : ""}.`  
                })

                if(!closeIssue && hasClosingKeyword) {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number,
                    state: "closed"
                  });
                }

                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number
                });

                if(issue.state === "closed" && !!issue.labels.some((label) => label.name === "pending")) {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number,
                    name: "pending"
                  })
                }

                console.log(`Closed issue #${issue_number}`);
              } catch (err) {
                console.log(`Failed for #${issue_number}`, err);
              }
            }

            core.info(`Copied labels: ${labels.join(", ")}`);
